global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "nodeexporter"
    static_configs:
      - targets: ["nodeexporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "openclaw"
    static_configs:
      - targets: ["openclaw:18789"]

  - job_name: "nginx"
    scrape_interval: 10s
    static_configs:
      - targets: ["nginx-prom-exporter:9113"]