groups:
  - name: openclaw-alerts
    rules:

      - alert: OpenClawDown
        expr: up{job="openclaw"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "OpenClaw backend is down"
          description: "No metrics scraped for job=openclaw"

      - alert: NginxHigh502
        expr: rate(nginx_upstream_responses_total{status=~"5.."}[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx 5xx upstream errors"
          description: "Upstream 5xx is above threshold"

      - alert: HostHighCPU
        expr: 100 - (avg by (instance)(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU load"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low"