server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    pipeline_stages:
      - docker: {}

      # ✅ Match JSON-in-JSON, exactly as seen in dry-run output
      - regex:
          source: log
          expression: '\\\\\"name\\\\\":\\\\\"(?P<channel>msteams)\\\\\"'

      - labels:
          channel:

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container

      - target_label: job
        replacement: docker
