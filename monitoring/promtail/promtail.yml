server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    pipeline_stages:
      # ----------------------------------------------------
      # 1) Unwrap Docker JSON logs
      # ----------------------------------------------------
      - docker: {}

      # ----------------------------------------------------
      # 2) Parse outer JSON (OpenClaw structure)
      #    Example:
      #    {
      #      "0": "{\"name\":\"msteams\"}",
      #      "1": "dispatch complete",
      #      "_meta": {...}
      #    }
      # ----------------------------------------------------
      - json:
          expressions:
            inner: '"0"'

      # ----------------------------------------------------
      # 3) Parse JSON string inside field "0"
      #    This handles:
      #      - {"name":"msteams"}
      #      - {"subsystem":"gateway"}
      #      - {"module":"cron"}
      # ----------------------------------------------------
      - json:
          source: inner
          expressions:
            channel: name
            subsystem: subsystem
            module: module

      # ----------------------------------------------------
      # 4) Promote extracted fields to labels
      #    (labels are only set if values exist)
      # ----------------------------------------------------
      - labels:
          channel:
          subsystem:
          module:

    relabel_configs:
      # Container name (clean)
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container

      # Static job label
      - target_label: job
        replacement: docker
