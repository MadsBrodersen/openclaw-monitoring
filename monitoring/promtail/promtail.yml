server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    pipeline_stages:
      - docker: {}

      # Extract Teams channel (msteams)
      - regex:
          expression: 'name":"(?P<channel>msteams)'

      # Promote extracted value to label
      - labels:
          channel:

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container

      - target_label: job
        replacement: docker
