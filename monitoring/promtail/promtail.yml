server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    pipeline_stages:
      # Docker JSON parsing
      - docker: {}

      # Første parsing: top-level JSON
      - json:
          expressions:
            meta0: "0"

      # Anden parsing: JSON-tekst inde i felt "0"
      - json:
          source: meta0
          expressions:
            channel: name
            subsystem: subsystem
            module: module

      # Promovér felterne til labels (kun når de findes)
      - labels:
          channel:
          subsystem:
          module

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container

      - source_labels: [__meta_docker_container_image]
        target_label: image

      - source_labels: [__meta_docker_container_id]
        target_label: container_id

      - target_label: job
        replacement: docker

      - source_labels: [__meta_docker_container_log_path]
        target_label: __path__
