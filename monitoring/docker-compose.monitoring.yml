services:

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    networks:
      - docker_backend
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules

    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks:
      - docker_backend
    volumes:
      - grafana_data:/var/lib/grafana

      # Provisioning mounts (MEGET VIGTIGE)
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning

    ports:
      - "3000:3000"

  nodeexporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    networks:
      - docker_backend
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    networks:
      - docker_backend
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8085:8080"

  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped
    networks:
      - docker_backend
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml

  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: openclaw-blackbox
    restart: unless-stopped
    networks:
      - docker_backend
    ports:
      - "9115:9115"
    command: ["--config.file=/config/blackbox.yml"]
    volumes:
      - ./monitoring/blackbox.yml:/config/blackbox.yml

  promtail:
    image: grafana/promtail:2.9.0
    restart: unless-stopped
    networks:
      - docker_backend
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro

volumes:
  grafana_data:
  prometheus_data:

networks:
  docker_backend:
    external: true
